  <link rel="stylesheet" href="css/style.css">
  <style>
    .kf-float{position:fixed;bottom:120px;right:24px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px}
    .kf-float a{display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:#07C160;color:#fff;text-decoration:none;border-radius:50%;font-size:20px;font-weight:500;box-shadow:0 2px 12px rgba(7,193,96,0.3);font-family:"Microsoft YaHei","PingFang SC",sans-serif}
    .kf-float a:hover{transform:scale(1.05)}
    .kf-float .label{font-size:10px;color:#07C160;letter-spacing:.5px;white-space:nowrap}
    .qr-float{position:fixed;bottom:190px;right:24px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px}
    .qr-float a{display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--bg);color:var(--text);text-decoration:none;border-radius:50%;font-size:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform .2s}
    .qr-float a:hover{transform:scale(1.05)}
    .qr-float .label{font-size:10px;color:var(--text);letter-spacing:.5px;white-space:nowrap}
    .qr-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;background:rgba(0,0,0,0.3)}
    .qr-overlay.show{display:block}
    .qr-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);padding:32px;text-align:center;z-index:1001;box-shadow:0 8px 40px rgba(0,0,0,0.1);max-width:320px;width:90%}
    .qr-popup.show{display:block}
    .qr-popup img{width:180px;height:180px;display:block;margin:0 auto}
    .qr-popup .title{font-family:var(--font-serif);font-size:16px;letter-spacing:2px;color:var(--text);margin-bottom:16px}
    .qr-popup .phone{font-size:13px;color:var(--text-light);margin-top:12px}
    .qr-popup .close{position:absolute;top:12px;right:16px;font-size:18px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:4px 8px}
    @media(max-width:600px){.kf-float{right:16px;bottom:80px}.kf-float a{width:44px;height:44px;font-size:16px}.kf-float .label{display:none}.qr-float{right:16px;bottom:150px}.qr-float a{width:38px;height:38px;font-size:16px}.qr-float .label{display:none}}
    .blog-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border)}
    .blog-item{padding:28px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;display:block;transition:background .2s;padding-left:16px;padding-right:16px;margin:0 -16px}
    .blog-item:hover{background:var(--bg-warm)}
    .blog-item .date{font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px}
    .blog-item h3{font-family:var(--font-serif);font-size:17px;font-weight:400;letter-spacing:1px;color:var(--text);margin-bottom:6px}
    .blog-item p{font-size:13px;color:var(--text-light);line-height:1.7}
    .blog-empty{padding:80px 0;text-align:center;color:var(--text-muted);font-size:14px;letter-spacing:1px}
  </style>
</head>

(function(){function d(e){var a=0,b=0,c=0,f=0;e.onmousedown=function(g){g.preventDefault();c=g.clientX;f=g.clientY;document.onmouseup=function(){document.onmouseup=null;document.onmousemove=null;};document.onmousemove=function(g){g.preventDefault();a=c-g.clientX;b=f-g.clientY;c=g.clientX;f=g.clientY;e.style.top=(e.offsetTop-b)+"px";e.style.left=(e.offsetLeft-a)+"px";e.style.bottom="auto";e.style.right="auto";}};}d(document.querySelector('.kf-float'));d(document.querySelector('.qr-float'));})();
