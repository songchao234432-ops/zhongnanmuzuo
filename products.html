<link rel="stylesheet" href="css/style.css">
<style>
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:768px){.product-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.product-grid{grid-template-columns:repeat(2,1fr);gap:10px}}

.product-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;text-align:center;padding:38px 20px 24px;text-decoration:none;color:inherit;display:block;transition:all .3s;position:relative}
.product-card:hover{border-color:var(--wood);box-shadow:0 8px 32px rgba(154,123,79,0.1);transform:translateY(-2px)}

.product-card .icon-wrap{position:relative;width:80px;height:80px;margin:0 auto 18px}
.product-card .ring-outer{position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,#C4A97D 0%,#9A7B4F 100%);opacity:.08;transition:opacity .35s}
.product-card:hover .ring-outer{opacity:.15}
.product-card .ring-inner{position:absolute;inset:6px;border-radius:50%;border:1.5px solid var(--border);transition:border-color .35s}
.product-card:hover .ring-inner{border-color:var(--wood)}
.product-card .ring-core{position:absolute;inset:14px;border-radius:50%;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;transition:background .35s,transform .35s}
.product-card:hover .ring-core{background:var(--wood);transform:scale(1.05)}
.product-card .ring-core span{font-family:"Noto Serif SC","Source Han Serif CN",STSong,serif;font-size:24px;color:var(--text-muted);transition:color .35s;line-height:1}
.product-card:hover .ring-core span{color:#fff}

.product-card .name{font-family:"Noto Serif SC","Source Han Serif CN",STSong,serif;font-size:15px;letter-spacing:3px;margin-bottom:6px}
.product-card .count{font-size:11px;color:var(--text-muted);letter-spacing:1px}
.product-card .badge{display:inline-block;font-size:10px;color:var(--wood);border:1px solid var(--wood);padding:2px 10px;border-radius:10px;margin-top:6px;letter-spacing:1px;transition:all .3s}
.product-card:hover .badge{background:var(--wood);color:#fff}

@media(max-width:600px){
  .product-card{padding:24px 8px 16px}
  .product-card .icon-wrap{width:60px;height:60px;margin-bottom:12px}
  .product-card .ring-core{inset:10px}
  .product-card .ring-core span{font-size:18px}
  .product-card .name{font-size:13px;letter-spacing:2px}
}
</style></head>
